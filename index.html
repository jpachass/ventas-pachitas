<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

/* HEADER */
.header{
    background:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-radius:0 0 20px 20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* CARD */
.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* INPUTS */
input, select{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
    box-sizing:border-box;
    height:50px;
    outline:none;
}

input:focus, select:focus{
    border-color:#ff6600;
    box-shadow:0 0 8px rgba(255,102,0,0.3);
}

/* SELECT */
select{
    appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg fill='black' height='20' viewBox='0 0 24 24'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 10px center;
}

/* TOTAL */
.total{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#27ae60;
    color:white;
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* RESUMEN */
.resumen{
    text-align:center;
    font-size:18px;
    margin:8px;
}
</style>
</head>

<body>

<div class="header">
🔥 VENTAS PACHITAS 🔥
</div>

<div class="card">
<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<input id="nombre" placeholder="NOMBRE">
<input id="celular" placeholder="CELULAR">
<input id="direccion" placeholder="DIRECCIÓN">

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<div id="total" class="total">S/. 0.00</div>

<button onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<div class="card">
<div class="resumen" id="hoy">💰 HOY: S/. 0.00</div>
<div class="resumen" id="mes">📅 MES: S/. 0.00</div>
</div>

<script type="module">
    import { getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let listaClientes = [];

// CARGAR CLIENTES
async function cargarClientes(){
    const querySnapshot = await getDocs(collection(db,"clientes"));
    listaClientes = [];

    querySnapshot.forEach(doc=>{
        listaClientes.push(doc.data());
    });
}

cargarClientes();

// AUTOCOMPLETAR
document.getElementById("buscarCliente").addEventListener("input", function(){

    let texto = this.value.toUpperCase();

    let cliente = listaClientes.find(c => c.nombre.includes(texto));

    if(cliente){
        document.getElementById("nombre").value = cliente.nombre;
        document.getElementById("celular").value = cliente.celular;
        document.getElementById("direccion").value = cliente.direccion;
    }
});

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ELEMENTOS
const nombre = document.getElementById("nombre");
const celular = document.getElementById("celular");
const direccion = document.getElementById("direccion");
const cantidad = document.getElementById("cantidad");
const precio = document.getElementById("precio");

// VALIDACIONES
nombre.oninput = ()=> nombre.value = nombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
direccion.oninput = ()=> direccion.value = direccion.value.toUpperCase();
celular.oninput = ()=> celular.value = celular.value.replace(/[^0-9]/g,'').slice(0,9);
cantidad.oninput = ()=> {cantidad.value=cantidad.value.replace(/[^0-9]/g,''); calc();}
precio.oninput = ()=> {precio.value=precio.value.replace(/[^0-9.]/g,''); calc();};

// TOTAL
function calc(){
    let total = (Number(cantidad.value)||0)*(Number(precio.value)||0);
    document.getElementById("total").innerText = "S/. " + total.toFixed(2);
}

// GUARDAR
window.guardarVenta = async ()=>{

    if(nombre.value=="" || celular.value.length!==9 || marca.value=="" || valvula.value==""){
        return alert("❌ COMPLETE TODOS LOS CAMPOS");
    }

    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        marca:marca.value,
        valvula:valvula.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        total:Number(cantidad.value)*Number(precio.value),
        pago:pago.value,
        delivery:delivery.value,
        fecha:new Date()
    });

    alert("✅ GUARDADO");

    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("select").forEach(s=>s.value="");

    document.getElementById("total").innerText="S/. 0.00";
}

// RESUMEN EN TIEMPO REAL
onSnapshot(collection(db,"ventas"), snap=>{
    let hoyTotal=0, mesTotal=0;

    let hoy = new Date().toDateString();
    let mes = new Date().getMonth();

    snap.forEach(doc=>{
        let v = doc.data();
        let f = v.fecha.toDate();

        if(f.toDateString()===hoy) hoyTotal+=v.total;
        if(f.getMonth()===mes) mesTotal+=v.total;
    });

    document.getElementById("hoy").innerText="💰 HOY: S/. "+hoyTotal.toFixed(2);
    document.getElementById("mes").innerText="📅 MES: S/. "+mesTotal.toFixed(2);
});

</script>

</body>
</html>
