<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

/* HEADER */
.header{
    background:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-radius:0 0 20px 20px;
}

/* CARD */
.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    box-sizing:border-box;
    height:50px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#27ae60;
    color:white;
    font-size:16px;
    margin-top:10px;
}

/* BOTON SECUNDARIO */
.btn-sec{
    background:#3498db;
}

/* MODAL */
.modal{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}
</style>
</head>

<body>

<div class="header">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">

<input id="nombre" placeholder="NOMBRE">
<input id="celular" placeholder="CELULAR">
<input id="direccion" placeholder="DIRECCIÓN">

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<div id="total">S/. 0.00</div>

<button onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<!-- MODAL CLIENTE -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>➕ NUEVO CLIENTE</h3>

<input id="nNombre" placeholder="NOMBRE">
<input id="nCelular" placeholder="CELULAR">
<input id="nDireccion" placeholder="DIRECCIÓN">

<button onclick="guardarCliente()">GUARDAR CLIENTE</button>
<button onclick="cerrarModal()" style="background:red;">CERRAR</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// VARIABLES
let clientes = [];

// CARGAR CLIENTES
async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
    snap.forEach(doc=>clientes.push(doc.data()));
}
cargarClientes();

// BUSCAR CLIENTE
document.getElementById("buscarCliente").addEventListener("input", function(){

    let texto = this.value.toUpperCase();
    let c = clientes.find(x => x.nombre.includes(texto));

    if(c){
        nombre.value = c.nombre;
        celular.value = c.celular;
        direccion.value = c.direccion;
    }
});

// VALIDACIONES
nombre.oninput = ()=> nombre.value = nombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
direccion.oninput = ()=> direccion.value = direccion.value.toUpperCase();
celular.oninput = ()=> celular.value = celular.value.replace(/[^0-9]/g,'').slice(0,9);

cantidad.oninput = precio.oninput = ()=>{
    cantidad.value=cantidad.value.replace(/[^0-9]/g,'');
    precio.value=precio.value.replace(/[^0-9.]/g,'');
    total.innerText="S/. "+((cantidad.value*precio.value)||0).toFixed(2);
};

// GUARDAR VENTA
window.guardarVenta = async ()=>{
    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        marca:marca.value,
        valvula:valvula.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        total:Number(cantidad.value)*Number(precio.value),
        pago:pago.value,
        delivery:delivery.value,
        fecha:new Date()
    });

    alert("✅ VENTA GUARDADA");
}

// MODAL
window.abrirModal = ()=> modal.style.display="flex";
window.cerrarModal = ()=> modal.style.display="none";

// GUARDAR CLIENTE
window.guardarCliente = async ()=>{

    await addDoc(collection(db,"clientes"),{
        nombre:nNombre.value.toUpperCase(),
        celular:nCelular.value,
        direccion:nDireccion.value.toUpperCase()
    });

    alert("✅ CLIENTE GUARDADO");

    cerrarModal();
    cargarClientes();
}

</script>

</body>
</html>
