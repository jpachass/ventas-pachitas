<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App PRO</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{
    background:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-radius:0 0 20px 20px;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    position:relative;
}

input, select{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    height:50px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:10px;
}

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;margin-bottom:10px;}

.sugerencias{
    position:absolute;
    width:100%;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    max-height:150px;
    overflow:auto;
    z-index:10;
}

.item{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.item:hover{
    background:#f1f1f1;
}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}
</style>
</head>

<body>

<div class="header">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<div id="lista" class="sugerencias"></div>

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<input id="nombre" placeholder="NOMBRE">
<input id="celular" placeholder="CELULAR">
<input id="direccion" placeholder="DIRECCIÓN">

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<div id="total">S/. 0.00</div>

<button class="btn-main" onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>➕ NUEVO CLIENTE</h3>

<input id="nNombre" placeholder="NOMBRE">
<input id="nCelular" placeholder="CELULAR">
<input id="nDireccion" placeholder="DIRECCIÓN">

<button class="btn-main" onclick="guardarCliente()">GUARDAR CLIENTE</button>
<button onclick="cerrarModal()" style="background:red;color:white;">CERRAR</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clientes=[];

// CARGAR CLIENTES
async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
    snap.forEach(doc=>clientes.push(doc.data()));
}
cargarClientes();

// BUSCADOR CON SUGERENCIAS + VALIDACIÓN
buscarCliente.oninput = function(){

    this.value = this.value.toUpperCase().replace(/[^A-Z\s]/g,'');

    let texto = this.value;
    lista.innerHTML="";

    if(texto.length < 1) return;

    let filtrados = clientes.filter(c => c.nombre.includes(texto));

    filtrados.forEach(c=>{
        let div = document.createElement("div");
        div.className="item";
        div.innerText = c.nombre + " - " + c.celular;

        div.onclick = ()=>{
            nombre.value = c.nombre;
            celular.value = c.celular;
            direccion.value = c.direccion;
            lista.innerHTML="";
        };

        lista.appendChild(div);
    });
};

// VALIDACIONES CAMPOS VENTA
nombre.oninput = ()=> nombre.value = nombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
direccion.oninput = ()=> direccion.value = direccion.value.toUpperCase();
celular.oninput = ()=> celular.value = celular.value.replace(/[^0-9]/g,'').slice(0,9);

cantidad.oninput = precio.oninput = ()=>{
    cantidad.value=cantidad.value.replace(/[^0-9]/g,'');
    precio.value=precio.value.replace(/[^0-9.]/g,'');
    total.innerText="S/. "+((cantidad.value*precio.value)||0).toFixed(2);
};

// VALIDACIONES MODAL
nNombre.oninput = ()=> nNombre.value = nNombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
nCelular.oninput = ()=> nCelular.value = nCelular.value.replace(/[^0-9]/g,'').slice(0,9);
nDireccion.oninput = ()=> nDireccion.value = nDireccion.value.toUpperCase();

// GUARDAR CLIENTE (VALIDADO + AUTOCOMPLETE)
window.guardarCliente = async ()=>{

    let nom = nNombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
    let cel = nCelular.value.replace(/[^0-9]/g,'').slice(0,9);
    let dir = nDireccion.value.toUpperCase();

    if(nom==="") return alert("❌ INGRESE NOMBRE");
    if(cel.length!==9) return alert("❌ CELULAR INVÁLIDO");
    if(dir==="") return alert("❌ INGRESE DIRECCIÓN");

    await addDoc(collection(db,"clientes"),{
        nombre:nom,
        celular:cel,
        direccion:dir
    });

    nombre.value=nom;
    celular.value=cel;
    direccion.value=dir;

    nNombre.value="";
    nCelular.value="";
    nDireccion.value="";

    cerrarModal();
    cargarClientes();

    alert("✅ CLIENTE GUARDADO Y LISTO 🚀");
};

// GUARDAR VENTA
window.guardarVenta = async ()=>{

    if(nombre.value=="" || celular.value.length!==9 || marca.value=="" || valvula.value==""){
        return alert("❌ COMPLETE LOS CAMPOS");
    }

    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        marca:marca.value,
        valvula:valvula.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        total:Number(cantidad.value)*Number(precio.value),
        pago:pago.value,
        delivery:delivery.value,
        fecha:new Date()
    });

    alert("✅ VENTA GUARDADA");

    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("select").forEach(s=>s.value="");

    total.innerText="S/. 0.00";
};

// MODAL
window.abrirModal = ()=> modal.style.display="flex";
window.cerrarModal = ()=> modal.style.display="none";

</script>

</body>
</html>
