<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANEL ADMIN PACHITAS</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

input{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    width:200px;
}

table{
    width:95%;
    margin:auto;
    border-collapse: collapse;
    background:white;
    color:black;
}

th, td{
    padding:10px;
    border:1px solid #ccc;
}

th{
    background:#ff6600;
    color:white;
}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.eliminar{
    background:red;
    color:white;
}
</style>
</head>

<body>

<h1>📊 PANEL ADMIN PACHITAS</h1>

<input id="buscar" placeholder="Buscar cliente / celular">
<input type="date" id="filtroFecha">

<h2 id="totalGeneral">TOTAL: S/. 0.00</h2>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Celular</th>
<th>Dirección</th>
<th>Cant</th>
<th>Total</th>
<th>Pago</th>
<th>Delivery</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas",
  storageBucket: "ventas-pachitas.firebasestorage.app",
  messagingSenderId: "444948394496",
  appId: "1:444948394496:web:5d03b37093d9d0f8031ee5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// FORMATO
function money(v){
    return "S/. " + v.toFixed(2);
}

// ELEMENTOS
let tabla = document.getElementById("tabla");
let buscar = document.getElementById("buscar");
let filtroFecha = document.getElementById("filtroFecha");
let totalGeneral = document.getElementById("totalGeneral");

let datos = [];

// 🔄 TIEMPO REAL
db.collection("ventas").onSnapshot(snapshot=>{
    datos = [];
    snapshot.forEach(doc=>{
        let d = doc.data();
        d.id = doc.id;
        datos.push(d);
    });

    render();
});

// 🎯 RENDER
function render(){

    tabla.innerHTML = "";
    let total = 0;

    let texto = buscar.value.toUpperCase();
    let fechaFiltro = filtroFecha.value;

    datos.forEach(v=>{

        let fecha = v.fecha?.toDate();

        let fechaTexto = fecha ? fecha.toLocaleString() : "";

        // 🔍 FILTROS
        if(texto &&
           !v.nombre.toUpperCase().includes(texto) &&
           !v.celular.includes(texto)) return;

        if(fechaFiltro){
            let f = fecha.toISOString().split("T")[0];
            if(f !== fechaFiltro) return;
        }

        total += v.total;

        tabla.innerHTML += `
        <tr>
        <td>${v.nombre}</td>
        <td>${v.celular}</td>
        <td>${v.direccion}</td>
        <td>${v.cantidad}</td>
        <td>${money(v.total)}</td>
        <td>${v.pago}</td>
        <td>${v.delivery}</td>
        <td>${fechaTexto}</td>
        <td><button class="eliminar" onclick="eliminar('${v.id}')">X</button></td>
        </tr>
        `;
    });

    totalGeneral.innerText = "TOTAL: " + money(total);
}

// 🔍 EVENTOS
buscar.oninput = render;
filtroFecha.onchange = render;

// 🗑️ ELIMINAR
function eliminar(id){

    let clave = prompt("Clave admin:");

    if(clave !== "PACHITAS"){
        alert("❌ Acceso denegado");
        return;
    }

    db.collection("ventas").doc(id).delete();
}

</script>

</body>
</html>
