<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App PRO</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{
    background:white;
    padding:20px;
    text-align:center;
    font-weight:bold;
    font-size:28px;
    border-radius:0 0 20px 20px;
    cursor:pointer; /* 🔥 indica que es interactivo */
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    position:relative;
}

input, select{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    height:50px;
    box-sizing:border-box;
}

input[readonly]{
    background:#f5f5f5;
    color:#555;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:10px;
}

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;margin-bottom:10px;}

#total{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#27ae60;
}

.sugerencias{
    position:absolute;
    width:100%;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    max-height:150px;
    overflow:auto;
}

.item{
    padding:10px;
    cursor:pointer;
}

.item:hover{
    background:#eee;
}

/* ADMIN */
#adminPanel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    padding:20px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="header" id="titulo">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<div id="lista" class="sugerencias"></div>

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<input id="nombre" placeholder="NOMBRE" readonly>
<input id="celular" placeholder="CELULAR" readonly>
<input id="direccion" placeholder="DIRECCIÓN" readonly>

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option>SI</option>
<option>NO</option>
</select>

<div id="total">S/. 0.00</div>

<button class="btn-main" onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h2>📊 PANEL ADMIN</h2>
<button onclick="cerrarAdmin()">Cerrar</button>
<div id="datos"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal"></div>

<script type="module">

// 🔥 CONTADOR DE CLICS
let clicks = 0;

titulo.addEventListener("click", ()=>{
    clicks++;

    if(clicks === 3){
        abrirAdmin();
        clicks = 0;
    }

    setTimeout(()=>clicks=0,1000); // reset si tarda mucho
});

// 🔥 ABRIR ADMIN
function abrirAdmin(){
    document.getElementById("adminPanel").style.display="block";
    cargarAdmin();
}

// 🔥 CERRAR ADMIN
function cerrarAdmin(){
    document.getElementById("adminPanel").style.display="none";
}

// 🔥 SIMULACIÓN DATOS ADMIN (puedes conectar Firebase luego)
function cargarAdmin(){
    document.getElementById("datos").innerHTML = "📊 Aquí verás tus ventas...";
}

</script>

</body>
</html>
