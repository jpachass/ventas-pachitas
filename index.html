<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App PRO</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{
    background:white;
    padding:20px;
    text-align:center;
    font-weight:bold;
    font-size:25px;
    border-radius:0 0 20px 20px;
    cursor:pointer;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    position:relative;
}

input, select{
    width:100%;
    height:50px;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
}

input[readonly]{background:#f5f5f5;}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:10px;
}

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;}

#total{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#27ae60;
}

.sugerencias{
    position:absolute;
    width:100%;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    max-height:150px;
    overflow:auto;
    z-index:100;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#eee;}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

#adminPanel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    padding:20px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="header" id="titulo">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<div id="lista" class="sugerencias"></div>

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<input id="nombre" readonly placeholder="NOMBRE">
<input id="celular" readonly placeholder="CELULAR">
<input id="direccion" readonly placeholder="DIRECCIÓN">

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<div id="total">S/. 0.00</div>

<button class="btn-main" onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>➕ NUEVO CLIENTE</h3>
<input id="nNombre" placeholder="NOMBRE">
<input id="nCelular" placeholder="CELULAR">
<input id="nDireccion" placeholder="DIRECCIÓN">
<button class="btn-main" onclick="guardarCliente()">GUARDAR</button>
<button onclick="cerrarModal()" style="background:red;color:white;">CERRAR</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h2>📊 PANEL ADMIN</h2>

<input id="buscarAdmin" placeholder="🔍 BUSCAR CLIENTE EN VENTAS">
<div id="listaAdmin" class="sugerencias"></div>
<button onclick="cerrarAdmin()">Cerrar</button>
<div id="contenidoAdmin"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADMIN
let clicks=0;
titulo.onclick=()=>{
    clicks++;
    if(clicks===3){
        abrirAdmin();
        clicks=0;
    }
    setTimeout(()=>clicks=0,1000);
};

window.cerrarAdmin=()=>adminPanel.style.display="none";

// CLIENTES
let clientes=[];
let ventasGlobal = [];
async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
    snap.forEach(doc=>{
        let c=doc.data();
        clientes.push({
            nombre:(c.nombre||"").toUpperCase(),
            celular:String(c.celular||""),
            direccion:(c.direccion||"").toUpperCase()
        });
    });
}
await cargarClientes();
await cargarClientes();

// 🔍 BUSCADOR ADMIN (AQUÍ VA)
buscarAdmin.oninput = function(){

    this.value = this.value.toUpperCase().replace(/[^A-Z\s]/g,'');

    let texto = this.value.trim();
    listaAdmin.innerHTML = "";

    if(!texto){
        contenidoAdmin.style.display="block";
        return;
    }

    contenidoAdmin.style.display="none";

    let filtrados = ventasGlobal.filter(v =>
        (v.nombre || "").toUpperCase().includes(texto)
    );

    if(filtrados.length === 0){
        listaAdmin.innerHTML = "<div class='item'>❌ SIN RESULTADOS</div>";
        return;
    }

    filtrados.forEach(v=>{

        let fecha = "";

        if(typeof v.fecha === "string"){
            fecha = new Date(v.fecha).toLocaleString();
        }
        else if(v.fecha?.seconds){
            fecha = new Date(v.fecha.seconds*1000).toLocaleString();
        }

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <b>${v.nombre}</b><br>
            💰 S/. ${v.total}<br>
            📅 ${fecha}
        `;

        listaAdmin.appendChild(div);
    });
};
// BUSCADOR VALIDADO
buscarCliente.oninput=function(){
    this.value=this.value.toUpperCase().replace(/[^A-Z0-9\s]/g,'');
    let texto=this.value.trim();
    lista.innerHTML="";
    if(!texto) return;

    let filtrados=clientes.filter(c =>
        c.nombre.includes(texto) || c.celular.includes(texto)
    );

    filtrados.forEach(c=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerHTML=`<b>${c.nombre}</b><br>${c.celular}`;
        div.onclick=()=>{
            nombre.value=c.nombre;
            celular.value=c.celular;
            direccion.value=c.direccion;
            buscarCliente.value="";
            lista.innerHTML="";
        };
        lista.appendChild(div);
    });
};

// VALIDACIONES NUEVO CLIENTE
nNombre.oninput=()=>nNombre.value=nNombre.value.toUpperCase();
nCelular.oninput=()=>nCelular.value=nCelular.value.replace(/[^0-9]/g,'').slice(0,9);
nDireccion.oninput=()=>nDireccion.value=nDireccion.value.toUpperCase();

// VALIDACIONES VENTA
cantidad.oninput=precio.oninput=()=>{
    cantidad.value=cantidad.value.replace(/[^0-9]/g,'');
    precio.value=precio.value.replace(/[^0-9.]/g,'');
    total.innerText="S/. "+((cantidad.value*precio.value)||0).toFixed(2);
};

// MODAL
window.abrirModal=()=>modal.style.display="flex";
window.cerrarModal=()=>modal.style.display="none";

// GUARDAR CLIENTE
window.guardarCliente=async ()=>{
    if(!nNombre.value) return alert("Ingrese nombre");
    if(nCelular.value.length!==9) return alert("Celular inválido");
    if(!nDireccion.value) return alert("Ingrese dirección");

    await addDoc(collection(db,"clientes"),{
        nombre:nNombre.value,
        celular:nCelular.value,
        direccion:nDireccion.value
    });

    await cargarClientes();

    nombre.value=nNombre.value;
    celular.value=nCelular.value;
    direccion.value=nDireccion.value;

    nNombre.value="";
    nCelular.value="";
    nDireccion.value="";

    buscarCliente.value="";
    lista.innerHTML="";

    cerrarModal();
};

// GUARDAR VENTA + LIMPIAR
window.guardarVenta=async ()=>{

    if(!nombre.value) return alert("Seleccione cliente");
    if(!marca.value) return alert("Seleccione marca");
    if(!valvula.value) return alert("Seleccione válvula");
    if(!cantidad.value) return alert("Ingrese cantidad");
    if(!precio.value) return alert("Ingrese precio");
    if(!pago.value) return alert("Seleccione método de pago");
    if(!delivery.value) return alert("Seleccione delivery");

    let totalCalc = Number(cantidad.value) * Number(precio.value);

    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        marca:marca.value,
        valvula:valvula.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        total:totalCalc,
        pago:pago.value,
        delivery:delivery.value,
        fecha:new Date().toISOString() // 🔥 CLAVE
    });

    alert("VENTA GRABADO EXITOSAMENTE");

    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("select").forEach(s=>s.value="");

    total.innerText="S/. 0.00";
};

// ADMIN CON VENTAS
async function abrirAdmin(){
    buscarAdmin.value="";
    listaAdmin.innerHTML="";
    contenidoAdmin.style.display="block";
    adminPanel.style.display="block";

    const snap = await getDocs(collection(db,"ventas"));

    let html="<h3>📊 RESUMEN</h3>";

    let totalGeneral=0;
    let totalHoy=0;
    let totalMes=0;
    let count=0;

    let hoy = new Date();
    let diaHoy = hoy.toISOString().slice(0,10); // YYYY-MM-DD
    let mesActual = hoy.toISOString().slice(0,7); // YYYY-MM

    let listaVentas = "<h3>🧾 DETALLE VENTAS</h3>";

    if(snap.empty){
        contenidoAdmin.innerHTML="<h3>⚠️ NO HAY VENTAS</h3>";
        return;
    }

    snap.forEach(doc=>{

        let v = doc.data();

        let monto = Number(v.total) || 0;
        totalGeneral += monto;
        count++;

        // 🔥 FECHA UNIVERSAL
        let fechaISO="";

        if(typeof v.fecha === "string"){
            fechaISO = v.fecha;
        }
        else if(v.fecha?.seconds){
            fechaISO = new Date(v.fecha.seconds*1000).toISOString();
        }

        let fechaDia = fechaISO.slice(0,10);
        let fechaMes = fechaISO.slice(0,7);

        if(fechaDia === diaHoy) totalHoy += monto;
        if(fechaMes === mesActual) totalMes += monto;

        let fechaMostrar = fechaISO ? new Date(fechaISO).toLocaleString() : "SIN FECHA";

        listaVentas += `
        <div style="margin-bottom:10px;">
            <b>${v.nombre || "-"}</b><br>
            💰 S/. ${monto.toFixed(2)}<br>
            🏷️ ${v.marca || "-"} - ${v.valvula || "-"}<br>
            💳 ${v.pago || "-"} | 🚚 ${v.delivery || "-"}<br>
            📅 ${fechaMostrar}
        </div>`;
    });
ventasGlobal = [];
    
snap.forEach(doc=>{
    let v = doc.data();
    ventasGlobal.push(v);
});
    html += `
        <div style="background:#222;padding:15px;border-radius:10px;margin-bottom:15px;">
            <h3>📅 HOY</h3>
            💰 S/. ${totalHoy.toFixed(2)}
        </div>

        <div style="background:#333;padding:15px;border-radius:10px;margin-bottom:15px;">
            <h3>📆 ESTE MES</h3>
            💰 S/. ${totalMes.toFixed(2)}
        </div>

        <div style="background:#444;padding:15px;border-radius:10px;margin-bottom:15px;">
            <h3>📊 TOTAL GENERAL</h3>
            💰 S/. ${totalGeneral.toFixed(2)}
        </div>

        <div style="background:#555;padding:15px;border-radius:10px;margin-bottom:15px;">
            <h3>🔢 TOTAL VENTAS</h3>
            ${count}
        </div>
    `;

    contenidoAdmin.innerHTML = html + listaVentas;
}

</script>

</body>
</html>
