<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENTAS PACHITAS</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to bottom, #ffcc00, #ff6600);
    text-align: center;
}

input, select {
    width: 85%;
    max-width: 350px;
    padding: 12px;
    margin: 6px;
    font-size: 16px;
    border-radius: 10px;
}

button {
    padding: 12px;
    background: green;
    color: white;
    border-radius: 8px;
}

#panel {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<h1>🔥 VENTAS PACHITAS 🔥</h1>

<div id="panel">
<input id="nombre" placeholder="NOMBRE">
<input id="celular" placeholder="CELULAR">
<input id="direccion" placeholder="DIRECCIÓN">
<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option>SI</option>
<option>NO</option>
</select>

<h2 id="total">TOTAL: S/. 0.00</h2>
<button onclick="guardarVenta()">GUARDAR</button>
</div>

<div id="panel">
<h3>📊 RESUMEN</h3>
<p id="hoy"></p>
<p id="mes"></p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

// CONFIG TUYA
const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas",
  storageBucket: "ventas-pachitas.firebasestorage.app",
  messagingSenderId: "444948394496",
  appId: "1:444948394496:web:5d03b37093d9d0f8031ee5",
  measurementId: "G-Y161Z07EK6"
};

// INICIALIZAR
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// MONEDA
function formatearMoneda(v){
    return "S/. " + v.toFixed(2);
}

// TOTAL
document.getElementById("cantidad").oninput =
document.getElementById("precio").oninput = function(){
    let c = Number(cantidad.value)||0;
    let p = Number(precio.value)||0;
    total.innerText = "TOTAL: " + formatearMoneda(c*p);
}

// GUARDAR EN LA NUBE
function guardarVenta(){

let nombre = nombreInput();
let celular = celularInput();
let direccion = direccionInput();
let cantidadV = Number(cantidad.value);
let precioV = Number(precio.value);
let totalV = cantidadV * precioV;

db.collection("ventas").add({
    nombre,
    celular,
    direccion,
    cantidad: cantidadV,
    precio: precioV,
    total: totalV,
    pago: pago.value,
    delivery: delivery.value,
    fecha: new Date()
});

alert("✅ GUARDADO EN LA NUBE");

}

// HELPERS
function nombreInput(){return document.getElementById("nombre").value.toUpperCase();}
function celularInput(){return document.getElementById("celular").value;}
function direccionInput(){return document.getElementById("direccion").value.toUpperCase();}

// RESUMEN EN TIEMPO REAL
db.collection("ventas").onSnapshot(snapshot=>{
    let totalHoy=0, totalMes=0;
    let hoy = new Date().toDateString();
    let mes = new Date().getMonth();

    snapshot.forEach(doc=>{
        let v = doc.data();
        let f = v.fecha.toDate();

        if(f.toDateString()===hoy) totalHoy+=v.total;
        if(f.getMonth()===mes) totalMes+=v.total;
    });

    hoyDiv.innerText = "💰 HOY: " + formatearMoneda(totalHoy);
    mesDiv.innerText = "📅 MES: " + formatearMoneda(totalMes);
});

</script>

</body>
</html>
