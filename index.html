<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App PRO</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{
    background:white;
    padding:20px;
    text-align:center;
    font-weight:bold;
    font-size:26px;
    border-radius:0 0 20px 20px;
    cursor:pointer;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    position:relative;
}

input, select{
    width:100%;
    height:50px;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
}

input[readonly]{background:#f5f5f5;}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:10px;
}

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;}

#total{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#27ae60;
}

.sugerencias{
    position:absolute;
    width:100%;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    max-height:150px;
    overflow:auto;
    z-index:100;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#eee;}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

#adminPanel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    padding:20px;
    overflow:auto;
}
#adminPanel input{
    color:black;
    background:white;
}

#listaAdmin{
    color:black;
}
</style>
</head>

<body>

<div class="header" id="titulo">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<div id="lista" class="sugerencias"></div>

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<input id="nombre" readonly placeholder="NOMBRE">
<input id="celular" readonly placeholder="CELULAR">
<input id="direccion" readonly placeholder="DIRECCIÓN">

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<div id="total">S/. 0.00</div>

<button class="btn-main" onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>➕ NUEVO CLIENTE</h3>
<input id="nNombre" placeholder="NOMBRE">
<input id="nCelular" placeholder="CELULAR">
<input id="nDireccion" placeholder="DIRECCIÓN">
<button class="btn-main" onclick="guardarCliente()">GUARDAR</button>
<button onclick="cerrarModal()" style="background:red;color:white;">CERRAR</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h2>📊 PANEL ADMIN</h2>

<input id="buscarAdmin" placeholder="🔍 NOMBRE / CELULAR / FECHA (YYYY-MM-DD)">
<div id="listaAdmin" class="sugerencias"></div>

<button onclick="cerrarAdmin()">Cerrar</button>
<div id="contenidoAdmin"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADMIN ACTIVACIÓN
let clicks=0;
titulo.onclick=()=>{
    clicks++;
    if(clicks===3){ abrirAdmin(); clicks=0; }
    setTimeout(()=>clicks=0,1000);
};

window.cerrarAdmin=()=>adminPanel.style.display="none";

// CLIENTES
let clientes=[];
let ventasGlobal=[];

async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
let esPrimero = true;

docsOrdenados.forEach(doc=>{

    let v = doc.data();

    let fechaISO = "";

    if(typeof v.fecha === "string"){
        fechaISO = v.fecha;
    }
    else if(v.fecha?.seconds){
        fechaISO = new Date(v.fecha.seconds * 1000).toISOString();
    }

    let monto = Number(v.total) || 0;

    totalGeneral += monto;

    if(fechaISO && fechaISO.slice(0,10) === hoyStr){
        totalHoy += monto;
    }

    if(fechaISO && fechaISO.slice(0,7) === mesStr){
        totalMes += monto;
    }

    let fechaMostrar = fechaISO
        ? new Date(fechaISO).toLocaleString()
        : "SIN FECHA";

    let estilo = esPrimero 
        ? "background:#2ecc71;color:black;"
        : "background:#1c1c1c;";

    esPrimero = false;

    ventasGlobal.push({
        nombre:(v.nombre||"").toUpperCase(),
        celular:String(v.celular||""),
        total:monto,
        fechaISO:fechaISO,
        fechaMostrar:fechaMostrar
    });

    html += `
    <div style="${estilo} padding:12px; border-radius:10px; margin-bottom:10px;">
        <b>${v.nombre || "-"}</b><br>
        📱 ${v.celular || "-"}<br>
        💰 S/. ${monto.toFixed(2)}<br>
        🏷️ ${v.marca || "-"} - ${v.valvula || "-"}<br>
        💳 ${v.pago || "-"} | 🚚 ${v.delivery || "-"}<br>
        📅 ${fechaMostrar}
    </div>`;
});

    // 🔥 PINTAR TODO
    contenidoAdmin.innerHTML = `
        <div style="background:#111;padding:12px;border-radius:10px;margin-bottom:15px;">
            <h3>📅 HOY: S/. ${totalHoy.toFixed(2)}</h3>
            <h3>📆 MES: S/. ${totalMes.toFixed(2)}</h3>
            <h3>📊 TOTAL: S/. ${totalGeneral.toFixed(2)}</h3>
        </div>

        <h3>🧾 LISTADO DE VENTAS</h3>

        ${html}
    `;
}

// BUSCADOR PRO
buscarAdmin.oninput=function(){

    this.value=this.value.toUpperCase().replace(/[^A-Z0-9-\s]/g,'');

    let texto=this.value.trim();
    listaAdmin.innerHTML="";

    if(!texto){
        contenidoAdmin.style.display="block";
        return;
    }

    contenidoAdmin.style.display="none";

    let filtrados=ventasGlobal.filter(v =>
        v.nombre.includes(texto) ||
        v.celular.includes(texto) ||
        v.fechaISO.includes(texto)
    );

    if(filtrados.length===0){
        listaAdmin.innerHTML="<div class='item'>❌ SIN RESULTADOS</div>";
        return;
    }

    filtrados.forEach(v=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerHTML=`
        <b>${v.nombre}</b><br>
        📱 ${v.celular}<br>
        💰 S/. ${v.total}<br>
        📅 ${v.fechaMostrar}
        `;
        listaAdmin.appendChild(div);
    });
};

</script>

</body>
</html>
