<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENTAS PACHITAS ONLINE</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to bottom, #ffcc00, #ff6600);
    text-align: center;
}

input, select {
    width: 85%;
    max-width: 350px;
    padding: 12px;
    margin: 6px;
    font-size: 16px;
    border-radius: 10px;
    border: 2px solid #ccc;
}

button {
    padding: 12px;
    background: green;
    color: white;
    border-radius: 8px;
}

#panel {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<h1>🔥 VENTAS PACHITAS ONLINE 🔥</h1>

<div id="panel">
<input id="nombre" placeholder="NOMBRE">
<input id="celular" placeholder="CELULAR">
<input id="direccion" placeholder="DIRECCIÓN">
<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<h2 id="total">TOTAL: S/. 0.00</h2>
<button onclick="guardarVenta()">GUARDAR</button>
</div>

<!-- FIREBASE MODULAR -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas",
  storageBucket: "ventas-pachitas.firebasestorage.app",
  messagingSenderId: "444948394496",
  appId: "1:444948394496:web:5d03b37093d9d0f8031ee5"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// VALIDACIONES
const nombre = document.getElementById("nombre");
const celular = document.getElementById("celular");
const direccion = document.getElementById("direccion");
const cantidad = document.getElementById("cantidad");
const precio = document.getElementById("precio");

nombre.addEventListener("input", () => {
    nombre.value = nombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
});

direccion.addEventListener("input", () => {
    direccion.value = direccion.value.toUpperCase();
});

celular.addEventListener("input", () => {
    celular.value = celular.value.replace(/[^0-9]/g,'').slice(0,9);
});

cantidad.addEventListener("input", () => {
    cantidad.value = cantidad.value.replace(/[^0-9]/g,'');
    calcularTotal();
});

precio.addEventListener("input", () => {
    precio.value = precio.value.replace(/[^0-9.]/g,'');
    calcularTotal();
});

// TOTAL
function calcularTotal(){
    let c = Number(cantidad.value)||0;
    let p = Number(precio.value)||0;
    document.getElementById("total").innerText = "TOTAL: S/. " + (c*p).toFixed(2);
}

// GUARDAR
window.guardarVenta = async function(){

    if(nombre.value=="" || celular.value.length!==9 || cantidad.value=="" || precio.value==""){
        alert("❌ COMPLETE LOS CAMPOS");
        return;
    }

    try{
        await addDoc(collection(db, "ventas"), {
            nombre: nombre.value,
            celular: celular.value,
            direccion: direccion.value,
            cantidad: Number(cantidad.value),
            precio: Number(precio.value),
            total: Number(cantidad.value)*Number(precio.value),
            pago: document.getElementById("pago").value,
            delivery: document.getElementById("delivery").value,
            fecha: new Date()
        });

        alert("✅ GUARDADO EN LA NUBE");

        document.querySelectorAll("input").forEach(i=>i.value="");
        document.getElementById("total").innerText="TOTAL: S/. 0.00";

    }catch(e){
        alert("❌ ERROR: " + e.message);
    }
}

</script>

</body>
</html>
