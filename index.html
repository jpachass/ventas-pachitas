<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENTAS PACHITAS ONLINE</title>

<style>
body {font-family: Arial; background: linear-gradient(to bottom,#ffcc00,#ff6600); text-align:center;}
input, select {
    width:85%; max-width:350px; padding:12px; margin:6px;
    border-radius:10px; border:2px solid #ccc;
}
button {padding:12px; background:green; color:white; border-radius:8px;}
#panel {background:white; margin:15px; padding:15px; border-radius:12px;}
</style>
</head>

<body>

<h1>🔥 VENTAS PACHITAS 🔥</h1>

<div id="panel">
<input id="nombre" placeholder="NOMBRE">
<input id="celular" placeholder="CELULAR">
<input id="direccion" placeholder="DIRECCIÓN">
<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">MÉTODO DE PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<h2 id="total">TOTAL: S/. 0.00</h2>
<button onclick="guardarVenta()">GUARDAR</button>
</div>

<div id="panel">
<h3>📊 RESUMEN</h3>
<p id="hoy">💰 HOY: S/. 0.00</p>
<p id="mes">📅 MES: S/. 0.00</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas",
  storageBucket: "ventas-pachitas.firebasestorage.app",
  messagingSenderId: "444948394496",
  appId: "1:444948394496:web:5d03b37093d9d0f8031ee5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// VALIDACIONES
const nombre = document.getElementById("nombre");
const celular = document.getElementById("celular");
const direccion = document.getElementById("direccion");
const cantidad = document.getElementById("cantidad");
const precio = document.getElementById("precio");

nombre.oninput = ()=> nombre.value = nombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
direccion.oninput = ()=> direccion.value = direccion.value.toUpperCase();
celular.oninput = ()=> celular.value = celular.value.replace(/[^0-9]/g,'').slice(0,9);
cantidad.oninput = ()=> {cantidad.value=cantidad.value.replace(/[^0-9]/g,''); calc();}
precio.oninput = ()=> {precio.value=precio.value.replace(/[^0-9.]/g,''); calc();};

function calc(){
    let t = (Number(cantidad.value)||0)*(Number(precio.value)||0);
    total.innerText = "TOTAL: S/. " + t.toFixed(2);
}

// GUARDAR
window.guardarVenta = async ()=>{
    if(nombre.value=="" || celular.value.length!==9) return alert("❌ DATOS INCORRECTOS");

    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        total:Number(cantidad.value)*Number(precio.value),
        pago:pago.value,
        delivery:delivery.value,
        fecha:new Date()
    });

    alert("✅ GUARDADO");

    document.querySelectorAll("input").forEach(i=>i.value="");
    total.innerText="TOTAL: S/. 0.00";
}

// 📊 RESUMEN EN TIEMPO REAL
onSnapshot(collection(db,"ventas"), snap=>{
    let hoyTotal=0, mesTotal=0;

    let hoy = new Date().toDateString();
    let mes = new Date().getMonth();

    snap.forEach(doc=>{
        let v = doc.data();
        let f = v.fecha.toDate();

        if(f.toDateString()===hoy) hoyTotal+=v.total;
        if(f.getMonth()===mes) mesTotal+=v.total;
    });

    document.getElementById("hoy").innerText="💰 HOY: S/. "+hoyTotal.toFixed(2);
    document.getElementById("mes").innerText="📅 MES: S/. "+mesTotal.toFixed(2);
});

</script>

</body>
</html>
