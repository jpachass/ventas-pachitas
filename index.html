<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App PRO</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{
    background:white;
    padding:20px;
    text-align:center;
    font-weight:bold;
    font-size:30px;
    border-radius:0 0 20px 20px;
    cursor:pointer;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    position:relative;
}

input, select{
    width:100%;
    height:50px;
    padding:12px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
}

input[readonly]{background:#f5f5f5;}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:10px;
}

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;}

#total{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#27ae60;
}

.sugerencias{
    position:absolute;
    width:100%;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    max-height:150px;
    overflow:auto;
    z-index:100;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#eee;}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

#adminPanel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    padding:20px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="header" id="titulo">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<div id="lista" class="sugerencias"></div>

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<input id="nombre" readonly placeholder="NOMBRE">
<input id="celular" readonly placeholder="CELULAR">
<input id="direccion" readonly placeholder="DIRECCIÓN">

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<div id="total">S/. 0.00</div>

<button class="btn-main" onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<!-- ADMIN -->
<div id="adminPanel">
<h2>📊 PANEL ADMIN</h2>
<button onclick="cerrarAdmin()">Cerrar</button>
<div id="contenidoAdmin"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 ADMIN
let clicks=0;
titulo.onclick=()=>{
    clicks++;
    if(clicks===3){
        abrirAdmin();
        clicks=0;
    }
    setTimeout(()=>clicks=0,1000);
};

// 🔥 CLIENTES
let clientes=[];
async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
    snap.forEach(doc=>clientes.push(doc.data()));
}
await cargarClientes();

// 🔥 BUSCADOR
buscarCliente.oninput=function(){
    let texto=this.value.toUpperCase().trim();
    lista.innerHTML="";

    if(!texto) return;

    let filtrados=clientes.filter(c =>
        (c.nombre||"").toUpperCase().includes(texto) ||
        String(c.celular||"").includes(texto)
    );

    filtrados.forEach(c=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerHTML=`<b>${c.nombre}</b><br>${c.celular}`;
        div.onclick=()=>{
            nombre.value=c.nombre;
            celular.value=c.celular;
            direccion.value=c.direccion;
            buscarCliente.value="";
            lista.innerHTML="";
        };
        lista.appendChild(div);
    });
};

// 🔥 VALIDACIONES
cantidad.oninput=precio.oninput=()=>{
    cantidad.value=cantidad.value.replace(/[^0-9]/g,'');
    precio.value=precio.value.replace(/[^0-9.]/g,'');
    total.innerText="S/. "+((cantidad.value*precio.value)||0).toFixed(2);
};

// 🔥 GUARDAR VENTA
window.guardarVenta=async ()=>{
    if(!nombre.value) return alert("Seleccione cliente");

    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        total:total.innerText,
        fecha:new Date()
    });

    alert("VENTA GUARDADA");
};

// 🔥 ADMIN PANEL
async function abrirAdmin(){
    document.getElementById("adminPanel").style.display="block";
    await cargarVentas();
}

window.cerrarAdmin=function(){
    document.getElementById("adminPanel").style.display="none";
};

// 🔥 CARGAR VENTAS
async function cargarVentas(){

    const snap = await getDocs(collection(db,"ventas"));

    let total=0;
    let html="<h3>VENTAS</h3>";

    snap.forEach(doc=>{
        let v=doc.data();

        let monto=parseFloat((v.total||"0").replace("S/. ","")) || 0;
        total+=monto;

        let fecha=new Date(v.fecha.seconds*1000).toLocaleString();

        html+=`
            <div style="margin-bottom:10px;">
                <b>${v.nombre}</b><br>
                💰 ${v.total}<br>
                📅 ${fecha}
            </div>
        `;
    });

    html+=`<h2>💰 TOTAL: S/. ${total.toFixed(2)}</h2>`;

    contenidoAdmin.innerHTML=html;
}

</script>

</body>
</html>
