<html lang="es">
<head>

<title>Pachitas App PRO</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{

    padding:18px;
    text-align:center;
    font-weight:bold;

    cursor:pointer;
}

.card{
    background:white;

    border-radius:20px;

input, select{

    border-radius:12px;

button{

    font-size:16px;

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;}

#total{

}

.sugerencias{

.item{padding:10px;cursor:pointer;}

.modal{

.modal-content{

#adminPanel{

}

#adminPanel input{

    background:white;
}

/* TARJETAS */
.card-venta{

    padding:15px;
    margin-bottom:12px;

.card-top{

.titulo-nombre{font-size:18px;font-weight:bold;}
.subtexto{font-size:14px;}
.total{font-size:18px;font-weight:bold;margin-top:5px;}

/* RESUMEN */
.resumen{
    display:grid;
    grid-template-columns:repeat(3,1fr);

}

.box{

}

.box h4{margin:0;font-size:13px;}
.box p{margin:5px 0 0;font-size:18px;font-weight:bold;}

.hoy{border-top:4px solid #2ecc71;}
.mes{border-top:4px solid #3498db;}
.totalb{border-top:4px solid #f1c40f;}
/* 🔥 AGREGA ESTO AL FINAL */
#ruletaCanvas{
    display:block;
    margin:0 auto;
    background:white;
    border-radius:50%;
}
</style>
</head>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas",
  storageBucket: "ventas-pachitas.appspot.com",
  messagingSenderId: "444948394496",
  appId: "1:444948394496:web:5d03b37093d9d0f8031ee5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clientes=[];

/* 🔥 PEGA AQUÍ */
let anguloActual = 0;
let girando = false;
let descuentoActual = 0;
let DIAS_BLOQUEO_RULETA = 60;

let clicks=0;
titulo.onclick=()=>{
    clicks++;
    if(clicks===3){ abrirAdmin(); clicks=0; }
    setTimeout(()=>clicks=0,1000);
};

window.cerrarAdmin=()=>adminPanel.style.display="none";

async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
    snap.forEach(doc=>{
        let c=doc.data();
        clientes.push({
            nombre:(c.nombre||"").toUpperCase(),
            celular:String(c.celular||""),
            direccion:(c.direccion||"").toUpperCase()
        });
    });
}
await cargarClientes();
cantidad.oninput = calcularTotal;
precio.oninput = calcularTotal;
nNombre.oninput = ()=>{
    nNombre.value = nNombre.value.toUpperCase().replace(/[^A-Z\s]/g,'');
};

nCelular.oninput = ()=>{
    nCelular.value = nCelular.value.replace(/[^0-9]/g,'').slice(0,9);
};

nDireccion.oninput = ()=>{
    nDireccion.value = nDireccion.value.toUpperCase();
};
    function calcularTotal(){

    let cant = Number(cantidad.value) || 0;
    let prec = Number(precio.value) || 0;

    let totalCalc = cant * prec;
    
    // 🔥 PROTECCIÓN
    let desc = Number(descuentoActual) || 0;

    // 🔥 APLICAR DESCUENTO (CORREGIDO)
    let totalFinal = totalCalc - desc;

    if(totalFinal < 0) totalFinal = 0;

    total.innerText = "S/. " + totalFinal.toFixed(2);
}
/* BUSCADOR CLIENTE */
buscarCliente.oninput=function(){
    this.value=this.value.toUpperCase().replace(/[^A-Z0-9\s]/g,'');
    let texto=this.value.trim();
    lista.innerHTML="";
    if(!texto){ lista.style.display="none"; return; }

    let filtrados=clientes.filter(c =>
        c.nombre.includes(texto) || c.celular.includes(texto)
    );

    lista.style.display="block";

    filtrados.forEach(c=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerHTML=`${c.nombre} - ${c.celular}`;
    
    div.onclick=async ()=>{

    nombre.value=c.nombre;
    celular.value=c.celular;
    direccion.value=c.direccion;

	// 🔥 AQUÍ VA
   	await actualizarEstadoRuleta(c.celular);

	const btnRuleta = document.getElementById('btnRuleta');
	const estadoRuleta = document.getElementById('estadoRuleta');

	// 🔥 VALIDACIÓN RULETA
let estado = await puedeGirarRuleta(c.celular);

if(!estado.puede){

    btnRuleta.disabled = true;
    btnRuleta.style.background = "#999";

    // 🔥 TEXTO DINÁMICO PRO
    btnRuleta.innerText = "⏳ DISPONIBLE EN " + estado.diasRestantes + " DÍAS";

}else{

    btnRuleta.disabled = false;
    btnRuleta.style.background = "#3498db";
    btnRuleta.innerText = "🎡 RULETA PROMO";
}

	// 🔥 BLOQUEO DE RULETA SI YA JUGÓ
	let yaUso = await yaUsoRuletaAlgunaVez(c.celular);

	if(yaUso){
    	btnRuleta.disabled = true;
    	btnRuleta.style.background = "#999";
	btnRuleta.innerText = "🚫 YA USÓ RULETA"; // 👈 AQUÍ VA
	}else{
   	btnRuleta.disabled = false;
   	btnRuleta.style.background = "#3498db";
	btnRuleta.innerText = "🎡 RULETA PROMO"; // 👈 AQUÍ VA
	}

    // 🔥 BUSCAR DESCUENTO
    descuentoActual = await obtenerPremioDisponible(c.celular) || 0;

    if(descuentoActual > 0){
        alert("🎁 ESTE CLIENTE TIENE UN DESCUENTO DE S/ " + descuentoActual + ".0");
    }
    calcularTotal();
    buscarCliente.value="";
    lista.style.display="none";

    calcularTotal(); 

};
        lista.appendChild(div);
    });
};

/* MODAL */
window.abrirModal=()=>{
    modal.style.display="flex";
setTimeout(()=>{
    requestAnimationFrame(()=>{
        dibujarRuleta();
    });
}, 200);

};
window.cerrarModal=()=>modal.style.display="none";

/* GUARDAR CLIENTE */
window.guardarCliente=async ()=>{

    let nombreVal = nNombre.value.trim();
    let celularVal = nCelular.value.trim();
    let direccionVal = nDireccion.value.trim();

    // 🔴 VALIDACIONES
    if(!nombreVal){
        alert("Ingrese nombre");
        return;
    }

    if(nombreVal.length < 3){
        alert("Nombre muy corto");
        return;
    }

    if(!celularVal){
        alert("Ingrese celular");
        return;
    }

    if(celularVal.length !== 9){
        alert("Celular debe tener 9 dígitos");
        return;
    }

    if(!direccionVal){
        alert("Ingrese dirección");
        return;
    }

    // 🔥 EVITAR DUPLICADOS (PRO)
    let existe = clientes.some(c => c.celular === celularVal);

    if(existe){
        alert("Este cliente ya existe");
        return;
    }

    let nuevo = {
        nombre: nombreVal.toUpperCase(),
        celular: celularVal,
        direccion: direccionVal.toUpperCase()
    };

    await addDoc(collection(db,"clientes"), nuevo);

    await cargarClientes();

    // 🔥 AUTOCOMPLETAR
    nombre.value = nuevo.nombre;
    celular.value = nuevo.celular;
    direccion.value = nuevo.direccion;

    // 🔥 LIMPIAR
    buscarCliente.value = "";
    lista.style.display = "none";

    nNombre.value = "";
    nCelular.value = "";
    nDireccion.value = "";

    cerrarModal();
};

/* GUARDAR VENTA */
window.guardarVenta=async ()=>{

    // 🔴 VALIDAR CLIENTE
    if(!nombre.value) return alert("Seleccione cliente");

    // 🔴 VALIDAR CAMPOS OBLIGATORIOS
    if(!marca.value) return alert("Seleccione marca");
    if(!valvula.value) return alert("Seleccione válvula");

    if(!cantidad.value){
        alert("Ingrese cantidad");
        return;
    }

    if(Number(cantidad.value) <= 0){
        alert("Cantidad inválida");
        return;
    }

    if(!precio.value){
        alert("Ingrese precio");
        return;
    }

    if(Number(precio.value) <= 0){
        alert("Precio inválido");
        return;
    }

    if(!pago.value) return alert("Seleccione método de pago");
    if(!delivery.value) return alert("Seleccione delivery");

    // 🔥 CALCULAR TOTAL SEGURO
	let subtotal = (Number(cantidad.value)||0) * (Number(precio.value)||0);

	let totalCalc = subtotal - descuentoActual;

	if(totalCalc < 0) totalCalc = 0;

    // 🔴 VALIDAR TOTAL
    if(totalCalc <= 0){
        alert("Total inválido");
        return;
    }

    // 🔥 GUARDAR EN FIREBASE
    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        marca:marca.value,
        valvula:valvula.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        pago:pago.value,
        delivery:delivery.value,
        total:totalCalc,
	descuento: descuentoActual,
        fecha: new Date().toLocaleString("sv-SE", { timeZone: "America/Lima" })
    });
    await marcarPremioUsado(celular.value);
    alert("VENTA GRABADO EXITOSAMENTE");

    // 🔥 LIMPIAR CAMPOS
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("select").forEach(s=>s.value="");
    total.innerText="S/. 0.00";
    descuentoActual = 0;
};
window.abrirRuleta = () => {

    if(!nombre.value){
        alert("Primero selecciona un cliente");
        return;
    }
    // 🔥 AQUÍ VA
    actualizarEstadoRuleta(celular.value);

    rNombre.value = nombre.value;
    rCelular.value = celular.value;

    modalRuleta.style.display = "flex";

    // 🔥 RESET
    anguloActual = 0;

    // 🔥 DOBLE INTENTO (GARANTIZA RENDER)
    setTimeout(()=>{
        dibujarRuleta();
        setTimeout(()=>dibujarRuleta(), 50);
    }, 100);
};   
    window.cerrarRuleta = () => {
    modalRuleta.style.display = "none";
};
const opcionesRuleta = ["S/2.00","S/2.50","S/3.00","S/2.00","S/2.50","S/3.00"];
const coloresRuleta = ["#ff4d4d","#66cc66","#ffd11a","#ff4d4d","#66cc66","#ffd11a"];


function dibujarRuleta(){

    const canvas = document.getElementById("ruletaCanvas");

    if(!canvas){
        console.error("❌ No existe canvas");
        return;
    }

    // 🔥 FORZAR TAMAÑO REAL (CLAVE)
    	canvas.width = 300;
	canvas.height = 300;
	canvas.style.width = "300px";
	canvas.style.height = "300px";

    const ctx = canvas.getContext("2d");

    if(!ctx){
        console.error("❌ No hay contexto 2D");
        return;
    }

    const opciones = ["S/2.00","S/2.50","S/3.00","S/2.00","S/2.50","S/3.00"];
    const colores = ["#ff4d4d","#66cc66","#ffd11a","#ff4d4d","#66cc66","#ffd11a"];

    const c = canvas.width / 2;
    const r = c - 5;
    const ang = 2 * Math.PI / opciones.length;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<opciones.length;i++){

        ctx.beginPath();
        ctx.moveTo(c,c);
        ctx.arc(c,c,r,anguloActual + i*ang,anguloActual + (i+1)*ang);
        ctx.fillStyle = colores[i];
        ctx.fill();

        ctx.save();
        ctx.translate(c,c);
        ctx.rotate(anguloActual + i*ang + ang/2);
        ctx.fillStyle="black";
        ctx.font="14px Arial";
        ctx.textAlign="right";
        ctx.fillText(opciones[i], r-10,5);
        ctx.restore();
    }
}
window.girarRuleta = async () => { 

    if(girando) return;

    let celularCliente = rCelular.value;

    if(!celularCliente){
        alert("Cliente inválido");
        return;
    }

 let puede = await puedeGirarRuleta(celularCliente);

if(!puede){
    alert("⛔ ESTE CLIENTE PODRÁ GIRAR DESPUÉS DE 60 DÍAS");
    return;
}

    girando = true;

    let vueltas = Math.random()*5 + 5;
    let duracion = 3500;
    let inicio = null;

    function animar(t){

        if(!inicio) inicio = t;

        let progreso = t - inicio;

        let ease = 1 - Math.pow(1 - progreso/duracion, 3);
        let velocidad = (vueltas * 2*Math.PI) * (1 - ease);

        anguloActual += velocidad * 0.02;

        dibujarRuleta();

        if(progreso < duracion){
            requestAnimationFrame(animar);
        } else {
            terminarRuleta();
        }
    }

    requestAnimationFrame(animar);
};
function terminarRuleta(){

    girando = false;

    let ang = 2*Math.PI/opcionesRuleta.length;

    let anguloFinal = (anguloActual + Math.PI/2) % (2*Math.PI);

    let index = Math.floor((2*Math.PI - anguloFinal)/ang) % opcionesRuleta.length;

    let premio = opcionesRuleta[index];

    alert("🎉 " + rNombre.value + " GANÓ " + premio + " DE DESCUENTO");

    // 🔥 GUARDAR EN FIREBASE
    guardarPremioRuleta(premio);
    
    // 🔥 AQUÍ VA (MUY IMPORTANTE)
    actualizarEstadoRuleta(rCelular.value);
}
async function guardarPremioRuleta(premio){

    try{

        await addDoc(collection(db,"ruleta"),{
            nombre: rNombre.value,
            celular: rCelular.value,
            premio: premio,
	    usado: false, // 🔥 NUEVO
            fecha: new Date().toLocaleString("sv-SE", { timeZone: "America/Lima" })
        });

        console.log("✅ Premio guardado");

    }catch(error){
        console.error("❌ Error guardando premio:", error);
    }
}
async function yaGiroHoy(celular){

    const snap = await getDocs(collection(db,"ruleta"));

    let hoy = new Date().toLocaleString("sv-SE", { timeZone: "America/Lima" }).slice(0,10);

    let yaGiro = false;

    snap.forEach(doc=>{
        let d = doc.data();

        let fecha = d.fecha || "";

        if(
            d.celular === celular &&
            fecha.slice(0,10) === hoy
        ){
            yaGiro = true;
        }
    });

    return yaGiro;
}
async function yaUsoRuletaAlgunaVez(celular){

    const snap = await getDocs(collection(db,"ruleta"));

    let usado = false;

    snap.forEach(doc=>{
        let d = doc.data();

        if(d.celular === celular){
            usado = true;
        }
    });

    return usado;
}
async function puedeGirarRuleta(celular){

    const snap = await getDocs(collection(db,"ruleta"));

    let ultimaFecha = null;

    snap.forEach(doc=>{
        let d = doc.data();

        if(d.celular !== celular) return;

        let fecha = d.fecha || "";

        if(!fecha) return;

        // 🔥 FIX FECHA
        let fechaObj = new Date(fecha.replace(" ", "T"));

        if(isNaN(fechaObj)) return;

        if(!ultimaFecha || fechaObj > ultimaFecha){
            ultimaFecha = fechaObj;
        }
    });

    // 🔥 NUNCA GIRÓ
    if(!ultimaFecha){
        return { puede: true, diasRestantes: 0 };
    }

    let hoy = new Date();

    let diffDias = (hoy - ultimaFecha) / (1000*60*60*24);

    let diasRestantes = Math.ceil(DIAS_BLOQUEO_RULETA - diffDias);

    if(diffDias >= DIAS_BLOQUEO_RULETA){
        return { puede: true, diasRestantes: 0 };
    }

    return { puede: false, diasRestantes: diasRestantes };
}
async function actualizarEstadoRuleta(celular){

    if(!celular) return;

   let estado = await puedeGirarRuleta(celular);

if(!estado.puede){

    btnRuleta.disabled = true;
    btnRuleta.style.background = "#999";
    // 🔥 AQUÍ VA
    estadoRuleta.style.color = "#e74c3c";

    let fechaDisponible = new Date();
    fechaDisponible.setDate(fechaDisponible.getDate() + estado.diasRestantes);

    let fechaTexto = fechaDisponible.toLocaleDateString("es-PE",{
        day:"2-digit",
        month:"2-digit"
    });

    let textoDias = estado.diasRestantes === 1 ? "DÍA" : "DÍAS";

    // 🔥 TEXTO ABAJO
    estadoRuleta.innerText = "⏳ DISPONIBLE EL " + fechaTexto + " (" + estado.diasRestantes + " " + textoDias + ")";

}else{

    btnRuleta.disabled = false;
    btnRuleta.style.background = "#3498db";

    // 🔥 LIMPIAR TEXTO
    estadoRuleta.innerText = "";
    // 🔥 RESET COLOR
    estadoRuleta.style.color = "#999";
}
}
async function obtenerPremioDisponible(celular){

    const snap = await getDocs(collection(db,"ruleta"));

    let premio = 0;
    let ultimaFecha = null;

    snap.forEach(doc=>{
        let d = doc.data();

        if(d.celular !== celular) return;

        // 🔥 IGNORAR SI YA FUE USADO
        if(d.usado === true) return;

        let fecha = new Date(d.fecha || "");

        if(!ultimaFecha || fecha > ultimaFecha){
            ultimaFecha = fecha;

            premio = Number((d.premio || "").replace("S/",""));
        }
    });

    return premio;
}
async function obtenerEstadoCuponCliente(celular){

    const snap = await getDocs(collection(db,"ruleta"));

    let ultimo = null;

    snap.forEach(doc=>{
        let d = doc.data();

        if(d.celular !== celular) return;

        let fecha = new Date(d.fecha || "");

        if(!ultimo || fecha > new Date(ultimo.fecha)){
            ultimo = d;
        }
    });

    // ❌ NO TIENE CUPÓN
    if(!ultimo){
        return { pendiente: null, usado: null };
    }

    // 🔥 SI YA FUE USADO
    if(ultimo.usado === true){
        return {
            pendiente: null,
            usado: "S/ " + Number((ultimo.premio || "").replace("S/","")).toFixed(2)
        };
    }

    // 🔥 SI AÚN NO LO USA
    return {
        pendiente: "S/ " + Number((ultimo.premio || "").replace("S/","")).toFixed(2),
        usado: null
    };
}
async function marcarPremioUsado(celular){

    const snap = await getDocs(collection(db,"ruleta"));

    let hoy = new Date().toLocaleString("sv-SE", { timeZone: "America/Lima" }).slice(0,10);

    snap.forEach(async docu=>{
        let d = docu.data();

        if(
            d.celular === celular &&
            (d.fecha || "").slice(0,10) === hoy &&
            d.usado === false
        ){
            await updateDoc(docu.ref, { usado: true }); // 🔥 MARCAR USADO
        }
    });
}

async function abrirAdmin(){

    adminPanel.style.display="block";
    contenidoAdmin.innerHTML="CARGANDO...";

    try{

        const snap = await getDocs(collection(db,"ventas"));

        if(!snap || snap.docs.length===0){
            contenidoAdmin.innerHTML="⚠️ NO HAY VENTAS";
            return;
        }

        let docs = snap.docs;

        let totalHoy=0,totalMes=0,totalGeneral=0;
        let hoy = new Date().toLocaleString("sv-SE", { timeZone: "America/Lima" }).slice(0,10);
        let mes = new Date().toLocaleString("sv-SE", { timeZone: "America/Lima" }).slice(0,7);

        // 🔥 ORDEN SEGURO
        docs.sort((a,b)=>{
            let fa=a.data().fecha;
            let fb=b.data().fecha;

            fa = (typeof fa==="string") ? fa :
                 (fa?.seconds ? new Date(fa.seconds*1000).toISOString() : "");

            fb = (typeof fb==="string") ? fb :
                 (fb?.seconds ? new Date(fb.seconds*1000).toISOString() : "");

            return fb.localeCompare(fa);
        });

        let html="";

        for (let i = 0; i < docs.length; i++) {

    	    let doc = docs[i];
            let v=doc.data()||{};

            let nombreV=(v.nombre||"").toUpperCase();
            let celularV=String(v.celular||"");
            let monto=Number(v.total)||0;
            let cantidadV = Number(v.cantidad) || 0;
            let direccionV = (v.direccion || "").toUpperCase();
	    let estadoCupon = await obtenerEstadoCuponCliente(celularV);
            // 🔥 FECHA SEGURA
            let fechaISO="";

            if(typeof v.fecha==="string"){
                fechaISO=v.fecha;
            }
            else if(v.fecha?.seconds){
                fechaISO=new Date(v.fecha.seconds*1000).toISOString();
            }

            let fechaMostrar = fechaISO
                ? new Date(fechaISO).toLocaleString()
                : "SIN FECHA";

            // 🔥 📦 ACUMULADORES
            totalGeneral+=monto;

            if(fechaISO.slice(0,10)===hoy) totalHoy+=monto;
            if(fechaISO.slice(0,7)===mes) totalMes+=monto;

html+=`
<div class="card-venta ${i==0?'card-top':''}" 
data-nombre="${nombreV}" 
data-celular="${celularV}" 
data-fecha="${fechaISO}"> 

    <div class="titulo-nombre">👤 ${nombreV}</div>
    <div class="subtexto">📍 ${direccionV}</div>
    <div class="subtexto">🏷️ ${v.marca||"-"}</div>
    <div class="subtexto">🔧 ${v.valvula||"-"}</div>
    <div class="subtexto">💳 ${v.pago||"-"}</div>
    <div class="subtexto">🚚 ${v.delivery||"-"}</div>
    <div class="subtexto">📅 ${fechaMostrar}</div>
    <div class="subtexto">💲 Precio Unit.: S/. ${Number(v.precio||0).toFixed(2)}</div>
    <div class="subtexto">🛒 Cantidad: ${cantidadV}</div>
    <div class="total">💰 Total S/. ${monto.toFixed(2)}</div>
${!v.descuento && estadoCupon.pendiente ? 
`<div class="subtexto" style="color:#f1c40f;">
🎁 Cupón pendiente para próxima compra: ${estadoCupon.pendiente}
</div>` 
: ""}${v.descuento && v.descuento > 0 ? 
`<div class="subtexto" style="color:#1B4F72;">
✅ Cliente usó descuento de S/. ${Number(v.descuento).toFixed(2)}
</div>` 
: ""}
</div>`;
        } // 🔥 AQUÍ CIERRA EL FOR

        contenidoAdmin.innerHTML=`
        <div class="resumen">
            <div class="box hoy"><h4>HOY</h4><p>S/. ${totalHoy.toFixed(2)}</p></div>
            <div class="box mes"><h4>MES</h4><p>S/. ${totalMes.toFixed(2)}</p></div>
            <div class="box totalb"><h4>TOTAL</h4><p>S/. ${totalGeneral.toFixed(2)}</p></div>
        </div>

        ${html}
        `;

    }catch(error){
        console.error("🔥 ERROR REAL:", error);
        contenidoAdmin.innerHTML="❌ ERROR AL CARGAR";
    }
}

/* 🔍 BUSCADOR QUE FILTRA TARJETAS */
buscarAdmin.oninput=function(){

    this.value=this.value.toUpperCase().replace(/[^A-Z0-9-\s]/g,'');

    let texto=this.value.trim();

    let cards=document.querySelectorAll(".card-venta");

    cards.forEach(card=>{
        let nombre=card.dataset.nombre||"";
        let celular=card.dataset.celular||"";
        let fecha=card.dataset.fecha||"";

        let ok=nombre.includes(texto) || celular.includes(texto) || fecha.includes(texto);

        card.style.display= ok ? "block":"none";
    });
};
window.exportarExcel = async () => {

    const snap = await getDocs(collection(db,"ventas"));

    let datos = [];

    snap.forEach(docu=>{
        let v = docu.data();
        if(v.activo === false) return;

        datos.push({
            nombre: v.nombre || "",
            celular: v.celular || "",
            direccion: v.direccion || "",
            marca: v.marca || "",
            valvula: v.valvula || "",
            cantidad: Number(v.cantidad)||0,
            precio: Number(v.precio)||0,
            pago: v.pago || "",
            delivery: v.delivery || "",
            fecha: v.fecha || "",
            total: Number(v.total)||0
        });
    });

    // 🔥 ORDENAR
    datos.sort((a,b)=> b.fecha.localeCompare(a.fecha));

    let hoy = new Date().toLocaleString("sv-SE",{timeZone:"America/Lima"}).slice(0,10);
    let mes = hoy.slice(0,7);

    let totalHoy=0,totalMes=0,totalGeneral=0;

    // 📄 DETALLE
    let detalle = datos.map((v,i)=>{

        let fechaFormateada="";
        if(v.fecha){
            let f=new Date(v.fecha);
            fechaFormateada=f.toLocaleString("es-PE",{
                timeZone:"America/Lima",
                day:"2-digit",
                month:"2-digit",
                year:"numeric",
                hour:"2-digit",
                minute:"2-digit"
            });
        }

        totalGeneral+=v.total;
        if(v.fecha.slice(0,10)===hoy) totalHoy+=v.total;
        if(v.fecha.slice(0,7)===mes) totalMes+=v.total;

        return {
            ITEM:i+1,
            CLIENTE:v.nombre,
            CELULAR:v.celular,
            DIRECCIÓN:v.direccion,
            MARCA:v.marca,
            VÁLVULA:v.valvula,
            CANTIDAD:v.cantidad,
            PRECIO:v.precio,
            PAGO:v.pago,
            DELIVERY:v.delivery,
            FECHA:fechaFormateada,
            TOTAL:v.total
        };
    });

    // 📊 RESUMEN
    let resumen = [
        {INDICADOR:"TOTAL HOY", VALOR:totalHoy},
        {INDICADOR:"TOTAL MES", VALOR:totalMes},
        {INDICADOR:"TOTAL GENERAL", VALOR:totalGeneral}
    ];

    // 🏆 TOP CLIENTES
    let clientesMap={};

    datos.forEach(v=>{
        clientesMap[v.nombre]=(clientesMap[v.nombre]||0)+v.total;
    });

    let topClientes = Object.keys(clientesMap)
    .map(n=>({CLIENTE:n,TOTAL:clientesMap[n]}))
    .sort((a,b)=>b.TOTAL-a.TOTAL)
    .map((v,i)=>({RANK:i+1,CLIENTE:v.CLIENTE,TOTAL:v.TOTAL}));

    // 📈 DASHBOARD (estructura)
// 📈 DASHBOARD PRO EMPRESA
let dashboard = [
    {SECCION:"📊 INDICADORES"},
    {KPI:"VENTAS HOY", VALOR:totalHoy},
    {KPI:"VENTAS MES", VALOR:totalMes},
    {KPI:"VENTAS TOTAL", VALOR:totalGeneral},
    {},
    {SECCION:"🏆 TOP CLIENTES"},
    {CLIENTE:"NOMBRE", TOTAL:"MONTO"}
];

// 🔥 AGREGAR TOP 5 AUTOMÁTICO
topClientes.slice(0,5).forEach(c=>{
    dashboard.push({
        CLIENTE:c.CLIENTE,
        TOTAL:c.TOTAL
    });
});
    // 📦 CREAR EXCEL
    const wb = XLSX.utils.book_new();

    const wsDetalle = XLSX.utils.json_to_sheet(detalle);
    const wsResumen = XLSX.utils.json_to_sheet(resumen);
    const wsTop = XLSX.utils.json_to_sheet(topClientes);
    const wsDashboard = XLSX.utils.json_to_sheet(dashboard);

// 🔥 FORMATO MONEDA - DETALLE
let rangeDetalle = XLSX.utils.decode_range(wsDetalle['!ref']);
for(let R = 1; R <= rangeDetalle.e.r; ++R){

    let cellTotal = wsDetalle[XLSX.utils.encode_cell({r:R,c:11})];
    if(cellTotal){
        cellTotal.t = "n";
        cellTotal.z = '"S/." #,##0.00';
    }

    let cellPrecio = wsDetalle[XLSX.utils.encode_cell({r:R,c:7})];
    if(cellPrecio){
        cellPrecio.t = "n";
        cellPrecio.z = '"S/." #,##0.00';
    }
}

// 🔥 FORMATO MONEDA - RESUMEN
let rangeResumen = XLSX.utils.decode_range(wsResumen['!ref']);
for(let R = 1; R <= rangeResumen.e.r; ++R){
    let cell = wsResumen[XLSX.utils.encode_cell({r:R,c:1})];
    if(cell){
        cell.t = "n";
        cell.z = '"S/." #,##0.00';
    }
}

// 🔥 FORMATO MONEDA - TOP CLIENTES
let rangeTop = XLSX.utils.decode_range(wsTop['!ref']);
for(let R = 1; R <= rangeTop.e.r; ++R){
    let cell = wsTop[XLSX.utils.encode_cell({r:R,c:2})];
    if(cell){
        cell.t = "n";
        cell.z = '"S/." #,##0.00';
    }
}

// 🔥 FORMATO MONEDA - DASHBOARD (CORRECTO TOTAL)

let rangeDash = XLSX.utils.decode_range(wsDashboard['!ref']);

for(let R = 1; R <= rangeDash.e.r; ++R){

    // 👉 COLUMNA VALOR (KPIs) → columna C (index 2)
    let cellValor = wsDashboard[XLSX.utils.encode_cell({r:R,c:2})];

    if(cellValor && typeof cellValor.v === "number"){
        cellValor.t = "n";
        cellValor.z = '"S/." #,##0.00';
    }

    // 👉 COLUMNA TOTAL CLIENTES → columna E (index 4)
    let cellTotal = wsDashboard[XLSX.utils.encode_cell({r:R,c:4})];

    if(cellTotal && typeof cellTotal.v === "number"){
        cellTotal.t = "n";
        cellTotal.z = '"S/." #,##0.00';
    }
}
    XLSX.utils.book_append_sheet(wb, wsDetalle, "DETALLE");
    XLSX.utils.book_append_sheet(wb, wsResumen, "RESUMEN");
    XLSX.utils.book_append_sheet(wb, wsTop, "TOP CLIENTES");
    XLSX.utils.book_append_sheet(wb, wsDashboard, "DASHBOARD");

    XLSX.writeFile(wb, "Ventas_Pachitas_Dashboard.xlsx");
};
