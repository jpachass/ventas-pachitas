<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pachitas App PRO</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#ff6600,#ffcc00);
}

.header{
    background:white;
    padding:18px;
    text-align:center;
    font-weight:bold;
    font-size:24px;
    border-radius:0 0 20px 20px;
    cursor:pointer;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

input, select{
    width:100%;
    height:50px;
    padding:10px;
    margin:6px 0;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
}

input[readonly]{background:#eee;}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-top:10px;
}

.btn-main{background:#27ae60;color:white;}
.btn-sec{background:#3498db;color:white;}

#total{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#27ae60;
}

.sugerencias{
    background:white;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    max-height:150px;
    overflow:auto;
    display:none;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#eee;}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
}

#adminPanel{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    padding:15px;
    overflow:auto;
}

#adminPanel input{
    color:black;
    background:white;
}

#listaAdmin{
    max-height:200px;
    overflow:auto;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="titulo">🔥 VENTAS PACHITAS 🔥</div>

<div class="card">

<input id="buscarCliente" placeholder="🔍 BUSCAR CLIENTE">
<div id="lista" class="sugerencias"></div>

<button class="btn-sec" onclick="abrirModal()">➕ NUEVO CLIENTE</button>

<input id="nombre" readonly placeholder="NOMBRE">
<input id="celular" readonly placeholder="CELULAR">
<input id="direccion" readonly placeholder="DIRECCIÓN">

<select id="marca">
<option value="">MARCA</option>
<option>SOL GAS</option>
<option>Z GAS</option>
<option>MAS GAS</option>
<option>AZUL GAS</option>
</select>

<select id="valvula">
<option value="">VÁLVULA</option>
<option>NORMAL</option>
<option>PREMIUM</option>
</select>

<input id="cantidad" placeholder="CANTIDAD">
<input id="precio" placeholder="PRECIO">

<select id="pago">
<option value="">PAGO</option>
<option>YAPE</option>
<option>EFECTIVO</option>
</select>

<select id="delivery">
<option value="">DELIVERY</option>
<option>SI</option>
<option>NO</option>
</select>

<div id="total">S/. 0.00</div>

<button class="btn-main" onclick="guardarVenta()">GUARDAR VENTA</button>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>NUEVO CLIENTE</h3>
<input id="nNombre" placeholder="NOMBRE">
<input id="nCelular" placeholder="CELULAR">
<input id="nDireccion" placeholder="DIRECCIÓN">
<button onclick="guardarCliente()" class="btn-main">GUARDAR</button>
<button onclick="cerrarModal()" style="background:red;color:white;">CERRAR</button>
</div>
</div>

<div id="adminPanel">
<h2>PANEL ADMIN</h2>

<input id="buscarAdmin" placeholder="BUSCAR NOMBRE / CELULAR / FECHA">
<div id="listaAdmin"></div>

<button onclick="cerrarAdmin()">Cerrar</button>

<div id="contenidoAdmin"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8MGBeJEo-eDyu0iHayj9WIQPZHx7UhMA",
  authDomain: "ventas-pachitas.firebaseapp.com",
  projectId: "ventas-pachitas",
  storageBucket: "ventas-pachitas.firebasestorage.app",
  messagingSenderId: "444948394496",
  appId: "1:444948394496:web:5d03b37093d9d0f8031ee5",
  measurementId: "G-Y161Z07EK6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let clientes=[];
let ventasGlobal=[];

// ADMIN CLICK
let clicks=0;
titulo.onclick=()=>{
    clicks++;
    if(clicks===3){ abrirAdmin(); clicks=0; }
    setTimeout(()=>clicks=0,1000);
};

window.cerrarAdmin=()=>adminPanel.style.display="none";

// CARGAR CLIENTES
async function cargarClientes(){
    const snap = await getDocs(collection(db,"clientes"));
    clientes=[];
    snap.forEach(doc=>{
        let c=doc.data();
        clientes.push({
            nombre:(c.nombre||"").toUpperCase(),
            celular:String(c.celular||""),
            direccion:(c.direccion||"").toUpperCase()
        });
    });
}
await cargarClientes();

// 🔍 BUSCADOR CLIENTE CORREGIDO
buscarCliente.oninput=function(){

    this.value=this.value.toUpperCase().replace(/[^A-Z0-9\s]/g,'');

    let texto=this.value.trim();
    lista.innerHTML="";

    if(!texto){
        lista.style.display="none";
        return;
    }

    let filtrados=clientes.filter(c =>
        c.nombre.includes(texto) || c.celular.includes(texto)
    );

    if(filtrados.length===0){
        lista.style.display="block";
        lista.innerHTML="<div class='item'>❌ SIN RESULTADOS</div>";
        return;
    }

    lista.style.display="block";

    filtrados.forEach(c=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerHTML=`${c.nombre} - ${c.celular}`;
        div.onclick=()=>{
            nombre.value=c.nombre;
            celular.value=c.celular;
            direccion.value=c.direccion;

            buscarCliente.value="";
            lista.innerHTML="";
            lista.style.display="none";
        };
        lista.appendChild(div);
    });
};

// VALIDACIONES
nNombre.oninput=()=>nNombre.value=nNombre.value.toUpperCase();
nCelular.oninput=()=>nCelular.value=nCelular.value.replace(/[^0-9]/g,'').slice(0,9);
nDireccion.oninput=()=>nDireccion.value=nDireccion.value.toUpperCase();

cantidad.oninput=precio.oninput=()=>{
    cantidad.value=cantidad.value.replace(/[^0-9]/g,'');
    precio.value=precio.value.replace(/[^0-9.]/g,'');
    total.innerText="S/. "+((cantidad.value*precio.value)||0).toFixed(2);
};

// MODAL
window.abrirModal=()=>modal.style.display="flex";
window.cerrarModal=()=>modal.style.display="none";

// GUARDAR CLIENTE
window.guardarCliente=async ()=>{
    await addDoc(collection(db,"clientes"),{
        nombre:nNombre.value,
        celular:nCelular.value,
        direccion:nDireccion.value
    });
    await cargarClientes();
    cerrarModal();
};

// GUARDAR VENTA
window.guardarVenta=async ()=>{
    let totalCalc = Number(cantidad.value)*Number(precio.value);

    await addDoc(collection(db,"ventas"),{
        nombre:nombre.value,
        celular:celular.value,
        direccion:direccion.value,
        marca:marca.value,
        valvula:valvula.value,
        cantidad:Number(cantidad.value),
        precio:Number(precio.value),
        total:totalCalc,
        pago:pago.value,
        delivery:delivery.value,
        fecha:new Date().toISOString()
    });

    alert("VENTA GUARDADA");

    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("select").forEach(s=>s.value="");
    total.innerText="S/. 0.00";
};

// 🔥 ADMIN CORREGIDO
async function abrirAdmin(){

    adminPanel.style.display="block";
    contenidoAdmin.innerHTML="CARGANDO...";

    try{

        const snap = await getDocs(collection(db,"ventas"));

        ventasGlobal=[];

        if(!snap || snap.docs.length===0){
            contenidoAdmin.innerHTML="⚠️ NO HAY VENTAS";
            return;
        }

        let docs = snap.docs;

        // 🔥 ORDENAMIENTO SEGURO (SIN ROMPER)
        docs.sort((a,b)=>{
            let fa = a.data().fecha;
            let fb = b.data().fecha;

            fa = (typeof fa === "string") ? fa :
                 (fa?.seconds ? new Date(fa.seconds*1000).toISOString() : "");

            fb = (typeof fb === "string") ? fb :
                 (fb?.seconds ? new Date(fb.seconds*1000).toISOString() : "");

            return fb.localeCompare(fa);
        });

        let html="";

        docs.forEach((doc,i)=>{

            let v = doc.data() || {};

            let nombreV = (v.nombre||"").toUpperCase();
            let celularV = String(v.celular||"");
            let totalV = Number(v.total)||0;

            // 🔥 FECHA SEGURA
            let fechaISO = "";

            if(typeof v.fecha === "string"){
                fechaISO = v.fecha;
            }
            else if(v.fecha?.seconds){
                fechaISO = new Date(v.fecha.seconds*1000).toISOString();
            }

            let fechaMostrar = fechaISO
                ? new Date(fechaISO).toLocaleString()
                : "SIN FECHA";

            ventasGlobal.push({
                nombre:nombreV,
                celular:celularV,
                total:totalV,
                fechaISO:fechaISO,
                fechaMostrar:fechaMostrar
            });

            html += `
            <div style="background:${i==0?'#2ecc71':'#1c1c1c'};padding:10px;margin-bottom:10px;border-radius:10px;">
                <b>${nombreV}</b><br>
                📱 ${celularV}<br>
                💰 S/. ${totalV.toFixed(2)}<br>
                📅 ${fechaMostrar}
            </div>`;
        });

        contenidoAdmin.innerHTML = html;

    }catch(error){
        console.error("🔥 ERROR REAL:", error);
        contenidoAdmin.innerHTML="❌ ERROR AL CARGAR";
    }
}

// 🔍 BUSCADOR ADMIN
buscarAdmin.oninput=function(){

    this.value=this.value.toUpperCase().replace(/[^A-Z0-9-\s]/g,'');

    let texto=this.value.trim();
    listaAdmin.innerHTML="";

    if(!texto) return;

    let filtrados=ventasGlobal.filter(v =>
        (v.nombre||"").includes(texto) ||
        (v.celular||"").includes(texto) ||
        (v.fechaISO||"").includes(texto)
    );

    if(filtrados.length===0){
        listaAdmin.innerHTML="<div class='item'>❌ SIN RESULTADOS</div>";
        return;
    }

    filtrados.forEach(v=>{
        let div=document.createElement("div");
        div.className="item";
        div.innerHTML=`
            ${v.nombre}<br>
            📱 ${v.celular}<br>
            💰 S/. ${v.total}
        `;
        listaAdmin.appendChild(div);
    });
};

</script>
</body>
</html>
